spring.application.name=backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:ecommerce_db}
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASS:admin123}
spring.jpa.hibernate.ddl-auto=update
# Set to true only when debugging SQL (noisy). For production use false.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# RabbitMQ
spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.rabbitmq.port=${RABBIT_PORT:5672}
spring.rabbitmq.username=${RABBIT_USER:admin}
spring.rabbitmq.password=${RABBIT_PASS:admin123}

# RabbitMQ config
rabbitmq.topicexchange.shop=shop.topic

rabbitmq.queue.ml=ml_queue
rabbitmq.routingkey.ml=behavior.*

rabbitmq.queue.elastic=elasticsearch_queue
rabbitmq.routingkey.elastic=product.*


# Elasticsearch
spring.elasticsearch.uris=${ES_URI:http://localhost:9200}
spring.data.elasticsearch.repositories.enabled=true

# Admin Configuration
admin.email=${ADMIN_EMAIL:admin@ecommerce.com}

# ML Service (Flask) for fast product categorization. If running, single-item categorization uses HTTP (milliseconds). If down, falls back to spawning Python (slower).
ml.service.url=${ML_SERVICE_URL:http://localhost:5000}
# When true, backend starts ml_service (Flask) in background if not already running. Set to false if you run ml_service via Docker or manually.
ml.service.auto-start=${ML_SERVICE_AUTO_START:true}
# When true, categorize each new/updated (Unclassified) product via ML. When false, do not run per-product ML; run Phase 1 periodically (POST /api/ml/phase1) to categorize in batch.
ml.categorize.on.save=${ML_CATEGORIZE_ON_SAVE:true}
# When ml_service is down: if true, fall back to spawning Python (slow, ~30s per product). If false, skip and leave product Unclassified until Phase 1 or ml_service is used.
ml.categorize.fallback-to-python=${ML_CATEGORIZE_FALLBACK_PYTHON:false}

# CORS (comma-separated origins; used by SecurityConfig). Include network URLs so login works from 192.168.x.x:5173 etc.
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000,http://localhost:5173,http://192.168.1.222:5173,http://172.30.144.1:5173}

# Multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Stripe Configuration (for production set STRIPE_SECRET_KEY and STRIPE_PUBLISHABLE_KEY in environment)
stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:}
